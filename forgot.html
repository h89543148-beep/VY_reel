<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>पासवर्ड भूल गए?</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="forgot.css">
</head>
<body>

    <div class="auth-box">
        <h1>🔐 VY-Reel</h1>
        <p>कोई बात नहीं! अपना ईमेल डालो, हम पासवर्ड रीसेट करने का लिंक भेज देंगे।</p>

        <input type="email" id="forgotEmail" placeholder="अपना ईमेल डालें">

        <button class="btn-primary" id="resetBtn">रीसेट लिंक भेजो 📧</button>

        <div id="resetMsg" style="margin-top: 15px; font-size: 14px;"></div>

        <p class="switch-text">
            <a href="../login/login.html">← वापस लॉग इन पर जाओ</a>
        </p>
    </div>

    <script src="forgot.js"></script>
</body>
</html>
